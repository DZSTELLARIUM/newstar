<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STR-2026-0021 — MyStar Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #050505;
    --bg-secondary: #0A0A0A;
    --text-primary: #e5e5e5;
    --text-secondary: #a3a3a3;
    --text-muted: #737373;
    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --accent-glow: rgba(59,130,246,0.15);
    --border: rgba(255,255,255,0.08);
    --border-light: rgba(255,255,255,0.05);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Starfield Background ── */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
  }

  .star-dot {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    0%   { opacity: var(--o1); transform: scale(1); }
    100% { opacity: var(--o2); transform: scale(1.4); }
  }

  /* ── Galaxy ── */
  .galaxy {
    position: fixed; z-index: 0; pointer-events: none;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: galaxyDrift 30s ease-in-out infinite alternate;
  }
  .galaxy-1 {
    width: 500px; height: 500px;
    top: -120px; right: -100px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.5), rgba(139,92,246,0.3), transparent 70%);
  }
  .galaxy-2 {
    width: 600px; height: 350px;
    bottom: -80px; left: -150px;
    background: radial-gradient(ellipse, rgba(236,72,153,0.35), rgba(59,130,246,0.2), transparent 70%);
    animation-delay: -15s;
  }
  .galaxy-3 {
    width: 300px; height: 300px;
    top: 40%; left: 50%;
    transform: translate(-50%,-50%);
    background: radial-gradient(ellipse, rgba(139,92,246,0.3), rgba(6,182,212,0.15), transparent 70%);
    animation-delay: -8s;
  }

  @keyframes galaxyDrift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(30px, -20px) rotate(8deg); }
  }

  /* ── Planets ── */
  .planet {
    position: fixed; z-index: 0; pointer-events: none;
    border-radius: 50%;
  }
  .planet-1 {
    width: 90px; height: 90px;
    top: 12%; left: -20px;
    background: radial-gradient(circle at 35% 35%, #7c3aed, #4c1d95 60%, #1e1b4b);
    box-shadow: inset -12px -8px 20px rgba(0,0,0,0.6), 0 0 40px rgba(124,58,237,0.2);
    animation: planetFloat1 25s ease-in-out infinite alternate;
  }
  .planet-1::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 150px; height: 20px;
    transform: translate(-50%,-50%) rotateX(70deg) rotateZ(-15deg);
    border: 2px solid rgba(167,139,250,0.25);
    border-radius: 50%;
  }
  .planet-2 {
    width: 50px; height: 50px;
    bottom: 18%; right: -10px;
    background: radial-gradient(circle at 35% 35%, #f97316, #c2410c 60%, #7c2d12);
    box-shadow: inset -8px -6px 14px rgba(0,0,0,0.5), 0 0 30px rgba(249,115,22,0.15);
    animation: planetFloat2 20s ease-in-out infinite alternate;
  }
  .planet-3 {
    width: 35px; height: 35px;
    top: 55%; left: 5%;
    background: radial-gradient(circle at 35% 35%, #06b6d4, #0e7490 60%, #164e63);
    box-shadow: inset -6px -5px 10px rgba(0,0,0,0.5), 0 0 20px rgba(6,182,212,0.15);
    animation: planetFloat3 22s ease-in-out infinite alternate;
  }

  @keyframes planetFloat1 { 0%{transform:translateY(0)} 100%{transform:translateY(20px)} }
  @keyframes planetFloat2 { 0%{transform:translateY(0)} 100%{transform:translateY(-15px)} }
  @keyframes planetFloat3 { 0%{transform:translateY(0)} 100%{transform:translateY(12px)} }

  /* ── Shooting Stars ── */
  .shooting-star {
    position: fixed; z-index: 0; pointer-events: none;
    width: 80px; height: 1px;
    background: linear-gradient(to right, rgba(255,255,255,0.7), transparent);
    opacity: 0;
    animation: shoot 6s ease-in-out infinite;
  }
  .shooting-star:nth-child(1) { top: 15%; left: 60%; animation-delay: 0s; transform: rotate(-35deg); }
  .shooting-star:nth-child(2) { top: 35%; left: 30%; animation-delay: 3s; transform: rotate(-25deg); }
  .shooting-star:nth-child(3) { top: 65%; left: 75%; animation-delay: 5s; transform: rotate(-40deg); }

  @keyframes shoot {
    0%   { opacity: 0; transform: translateX(0) rotate(-35deg); }
    5%   { opacity: 1; }
    15%  { opacity: 0; transform: translateX(-200px) rotate(-35deg); }
    100% { opacity: 0; }
  }

  /* ── Nebula swirls ── */
  .nebula {
    position: fixed; z-index: 0; pointer-events: none;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.06;
  }
  .nebula-1 {
    width: 400px; height: 200px;
    top: 30%; right: -100px;
    background: linear-gradient(135deg, #ec4899, #8b5cf6);
    animation: nebulaPulse 15s ease-in-out infinite alternate;
  }
  .nebula-2 {
    width: 350px; height: 180px;
    bottom: 25%; left: -80px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    animation: nebulaPulse 18s ease-in-out infinite alternate-reverse;
  }
