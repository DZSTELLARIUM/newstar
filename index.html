
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل النجوم العالمي - STR-2026-0021</title>
    <style>
        /* إعدادات الخلفية المتحركة */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            background-attachment: fixed;
            color: white;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* إضافة تأثير المجرات والنجوم */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://transparenttextures.com');
            z-index: -1;
            animation: moveStars 100s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 10000px 5000px; }
        }

        /* كرت الشهادة */
        .certificate-card {
            background: rgba(10, 15, 30, 0.85);
            border: 3px solid #d4af37;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            max-width: 600px;
            width: 90%;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
        }

        h1 { color: #d4af37; margin-bottom: 10px; font-size: 28px; }
        p { font-size: 18px; line-height: 1.6; }
        .star-id { color: #f1c40f; font-weight: bold; font-size: 22px; }

        /* الأزرار */
        .btn {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: #000;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.6);
        }

        /* تصميم الـ Popup */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
        }

        .popup-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; height: 80%;
            background: #000;
            border: 2px solid #d4af37;
            border-radius: 10px;
            overflow: hidden;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            color: white; font-size: 30px;
            cursor: pointer; z-index: 1001;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="certificate-card">
        <img src="https://flaticon.com" width="80" alt="Star Icon">
        <h1>شهادة تسجيل نجمة رسمية</h1>
        <p>تم تسجيل هذه النجمة في الفهرس العالمي للنجوم</p>
        <p>رقم تعريف النجمة: <span class="star-id">STR-2026-0021</span></p>
        <p>المالك: <strong>اسم الشخص هنا</strong></p>
        
        <button class="btn" onclick="openStellarium()">رؤية النجمة في السماء ✨</button>
    </div>

    <!-- نافذة Stellarium المنبثقة -->
    <div id="stellariumOverlay" class="overlay">
        <span class="close-btn" onclick="closeStellarium()">&times;</span>
        <div class="popup-content">
            <!-- موقع Stellarium Web -->
            <iframe src="https://stellarium-web.org"></iframe>
        </div>
    </div>

    <script>
        function openStellarium() {
            document.getElementById("stellariumOverlay").style.display = "block";
        }

        function closeStellarium() {
            document.getElementById("stellariumOverlay").style.display = "none";
        }

        // إغلاق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            let overlay = document.getElementById("stellariumOverlay");
            if (event.target == overlay) {
                overlay.style.display = "none";
            }
        }
    </script>
</body>
</html>
