<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شهادة ملكية نجمة - ياني</title>
    <style>
        /* إعدادات الخلفية الفضائية */
        body {
            margin: 0;
            height: 100vh;
            background: #02050a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            perspective: 1000px;
        }

        /* صناعة النجوم برمجياً لضمان ظهورها */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -2;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* إضافة كوكب متحرك في الزاوية */
        .planet {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #5d44a8, #24164d);
            border-radius: 50%;
            top: 10%;
            right: 10%;
            box-shadow: -20px -20px 50px rgba(0,0,0,0.5) inset, 0 0 30px rgba(93, 68, 168, 0.3);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* بطاقة الشهادة */
        .card {
            background: rgba(10, 15, 30, 0.9);
            border: 2px solid #d4af37;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(15px);
            max-width: 450px;
            z-index: 10;
        }

        h1 { color: #d4af37; font-size: 24px; margin-bottom: 20px; }
        .info { font-size: 18px; margin: 10px 0; }
        .highlight { color: #f1c40f; font-weight: bold; font-size: 22px; }

        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #f1c40f; }

        /* الـ Popup */
        .popup {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
        }

        .popup-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; height: 85%;
            border: 2px solid #d4af37;
        }

        .close {
            position: absolute;
            top: -40px; right: 0;
            color: white; font-size: 30px; cursor: pointer;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="stars-container" id="starField"></div>
    <div class="planet"></div>

    <div class="card">
        <img src="https://icons8.com" alt="star">
        <h1>شهادة تسجيل ملكية</h1>
        <p class="info">بموجب هذه الوثيقة، تم تسجيل النجمة:</p>
        <p class="highlight">HD 209458</p>
        <p class="info">رسمياً باسم:</p>
        <p class="highlight" style="font-size: 28px;">ياني</p>
        <button class="btn" onclick="openMap()">رأيت نجمتي ✨</button>
    </div>

    <!-- نافذة Stellarium -->
    <div id="mapPopup" class="popup">
        <div class="popup-box">
            <span class="close" onclick="closeMap()">&times; إغلاق</span>
            <!-- تم ضبط الرابط ليبحث عن النجمة HD 209458 مباشرة -->
            <iframe id="stellaFrame" src=""></iframe>
        </div>
    </div>

    <script>
        // توليد النجوم في الخلفية
        const field = document.getElementById('starField');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            field.appendChild(star);
        }

        function openMap() {
            // توجيه الخريطة للنجمة المطلوبة
            document.getElementById('stellaFrame').src = "https://stellarium-web.org";
            document.getElementById('mapPopup').style.display = 'block';
        }

        function closeMap() {
            document.getElementById('mapPopup').style.display = 'none';
            document.getElementById('stellaFrame').src = ""; // إيقاف التحميل لتوفير الموارد
        }
    </script>
</body>
</html>
